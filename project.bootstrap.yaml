version: 1
project:
  name: machete
  description: Swiss army knife for macOS setup and maintenance.
  visibility: public
  owner: OMT-Global
  defaultBranch: main
repo:
  managedPaths:
    - project.bootstrap.yaml
    - AGENTS.md
    - CLAUDE.md
    - CODEOWNERS
    - .mailmap
    - .shellcheckrc
    - .githooks/**
    - .devcontainer/**
    - .github/pull_request_template.md
    - .github/workflows/pr-fast-ci.yml
    - .github/workflows/extended-validation.yml
    - .github/workflows/claude.yml
    - scripts/check-detect-secrets.sh
    - scripts/ci/**
    - scripts/codex-cloud/**
    - scripts/claude-cloud/**
    - scripts/claude/**
    - docs/bootstrap/**
    - docs/history-privacy-decision.md
    - docs/public-readiness.md
archetype:
  kind: generic-empty
  packageManager: npm
  moduleName: machete
github:
  createRepo: false
  reviewers:
    - jmcte
  codeowners:
    - pattern: "*"
      owners:
        - "@jmcte"
  autoMerge: true
  deleteBranchOnMerge: true
  requiredApprovals: 1
  requiredStatusChecks:
    - CI Gate
  dismissStaleReviews: true
  requireCodeOwnerReviews: true
  requireLastPushApproval: false
  enforceLinearHistory: true
  allowMergeCommit: true
  allowSquashMerge: true
  allowRebaseMerge: true
  repoFeatures:
    hasIssues: true
    hasProjects: false
    hasWiki: false
    hasDiscussions: false
ci:
  runnerPolicy: public-shell-safe
  nodeVersion: "20"
  pythonVersion: "3.12"
  fastChecks:
    - secrets
    - shellcheck
  extendedChecks:
    - mac-bootstrap
  nightlyCron: 0 7 * * *
agents:
  manageCodexHome: true
  manageClaudeHome: true
  codexProfile: default
  claudeProfile: default
  portableProfileDenylist:
    - .env
    - .env.*
    - .claude/**
    - .codex/**
    - .machete/**
    - .cache/**
    - Library/Caches/**
    - .ssh/**
    - .gnupg/**
    - .aws/credentials
    - .aws/config
    - .netrc
    - .pypirc
    - .npmrc
    - .docker/config.json
    - .config/gh/hosts.yml
    - .kube/config
    - "*token*"
    - "*session*"
    - "*cookie*"
    - "*credential*"
    - "*secret*"
  enableClaudeWebEnvironment: true
  enableClaudeDevcontainer: true
  enableClaudeGitHubAction: true
  sharedSkills: []
environments:
  dev:
    reviewers: []
    requireApproval: false
    preventSelfReview: false
    branches: []
  stage:
    reviewers:
      - jmcte
    requireApproval: true
    preventSelfReview: true
    branches: []
  prod:
    reviewers:
      - jmcte
    requireApproval: true
    preventSelfReview: true
    branches:
      - main
